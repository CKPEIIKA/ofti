line-length = 100
target-version = "py311"
exclude = ["refs"]
fix = true
unsafe-fixes = false

[lint]
select = [
  "C90",
  "E",
  "W",
  "F",
  "I",
  "B",
  "C4",
  "ERA",
  "A",
  "FA",
  "ARG",
  "COM",
  "DTZ",
  "EXE",
  "FBT",
  "G",
  "ICN",
  "INP",
  "ISC",
  "N",
  "PERF",
  "PIE",
  "PTH",
  "Q",
  "S",
  "PL",
  "RUF",
  "RET",
  "T10",
  "TID",
  "TRY",
  "UP",
  "SIM",
  "YTT",
]
ignore = [
  "FBT",
  "PLR0913",
  "PLR0915",
  "PLR2004",
  "S101",
  "PLW1510",
  "S110",
  "S112",
  "PLC0415",
  "ARG001",
  "PERF401",
  "B023",
  "TRY003",
]
fixable = ["ALL"]
unfixable = []

